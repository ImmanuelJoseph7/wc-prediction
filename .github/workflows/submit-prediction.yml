name: Submit Prediction

on:
  workflow_dispatch:
    inputs:
      user:
        description: "User name"
        required: true
        type: string
      pin:
        description: "User PIN"
        required: true
        type: string
      predictions:
        description: "JSON array of predictions"
        required: true
        type: string

jobs:
  submit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Process prediction
        env:
          INPUT_USER: ${{ github.event.inputs.user }}
          INPUT_PIN: ${{ github.event.inputs.pin }}
          INPUT_PREDICTIONS: ${{ github.event.inputs.predictions }}
        run: python scripts/submit_prediction.py

      - run: python scripts/calculate.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "Prediction: ${{ github.event.inputs.user }}" && git pull --rebase && git push)
