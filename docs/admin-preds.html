<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Predictions</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .breakdown-table, .breakdown-table th, .breakdown-table td, .breakdown-table tr { background: transparent !important; color: #222 !important; }
  </style>
</head>
<body>
  <main class="container">
    <h1>🔒 Upcoming Predictions</h1>
    <small><a href="index.html">← Back to Leaderboard</a></small>
    <dialog id="admin-login" open>
      <article>
        <h2>Admin Login</h2>
        <input type="password" id="pin-input" placeholder="PIN" maxlength="4" pattern="\d{4}">
        <button id="login-btn">Login</button>
        <small id="login-error" class="error"></small>
      </article>
    </dialog>

    <section id="admin-panel" class="hidden">
      <div class="table-wrap" id="preds-wrap"></div>
    </section>
  </main>
  <script>
const SUPABASE_URL = "https://mxmaedzsfvrugdmcjzri.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14bWFlZHpzZnZydWdkbWNqenJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDU2NjEsImV4cCI6MjA5NzA4MTY2MX0.KHm7x2Huxi1JPeGZPfxLY6AIIIl6c4bbkXz4fxWBnYk";
const HEADERS = {"apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`};
const ADMIN_HASH = "41c991eb6a66242c0454191244278183ce58cf4a6bcd372f799e4b9cc01886af";
const FLAGS = {"Algeria":"dz","Argentina":"ar","Australia":"au","Austria":"at","Belgium":"be","Bosnia-Herzegovina":"ba","Brazil":"br","Canada":"ca","Cape Verde Islands":"cv","Colombia":"co","Congo DR":"cd","Croatia":"hr","Curaçao":"cw","Czechia":"cz","Ecuador":"ec","Egypt":"eg","England":"gb-eng","France":"fr","Germany":"de","Ghana":"gh","Haiti":"ht","Iran":"ir","Iraq":"iq","Ivory Coast":"ci","Japan":"jp","Jordan":"jo","Mexico":"mx","Morocco":"ma","Netherlands":"nl","New Zealand":"nz","Norway":"no","Panama":"pa","Paraguay":"py","Portugal":"pt","Qatar":"qa","Saudi Arabia":"sa","Scotland":"gb-sct","Senegal":"sn","South Africa":"za","South Korea":"kr","Spain":"es","Sweden":"se","Switzerland":"ch","Tunisia":"tn","Turkey":"tr","United States":"us","Uruguay":"uy","Uzbekistan":"uz"};
const flag = (team) => { const c = FLAGS[team]; return c ? `<img src="https://flagcdn.com/16x12/${c}.png" alt="${team}" style="vertical-align:middle">` : ""; };

async function hashPin(pin) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pin));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

async function sb(table, query = "") {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {headers: HEADERS});
  return r.json();
}

document.getElementById("login-btn").onclick = async () => {
  const pin = document.getElementById("pin-input").value;
  if ((await hashPin(pin)) !== ADMIN_HASH) {
    document.getElementById("login-error").textContent = "Access denied.";
    return;
  }
  document.getElementById("admin-login").close();
  document.getElementById("admin-panel").classList.remove("hidden");
  render();
};

async function render() {
  const [matchesRaw, predsRaw, usersRaw] = await Promise.all([
    sb("matches", "select=*&order=kickoff.asc"),
    sb("predictions", "select=*"),
    sb("users", "select=name")
  ]);
  const matches = matchesRaw.map(r => ({id: r.id, home_team: r.home_team, away_team: r.away_team, datetime: r.kickoff, status: r.status}));
  const predictions = predsRaw.map(r => ({user: r.user_name, match_id: r.match_id, home_score: r.home_score, away_score: r.away_score, pen_winner: r.pen_winner}));

  const upcoming = matches.filter(m => m.status !== "FINISHED").sort((a, b) => a.datetime.localeCompare(b.datetime));
  if (!upcoming.length) { document.getElementById("preds-wrap").innerHTML = "<p>No upcoming matches.</p>"; return; }

  const users = usersRaw.map(u => u.name).sort();
  const initials = users.map(u => u.split(" ").map(w => w[0]).join(""));

  let html = '<table class="breakdown-table"><thead><tr><th>Match</th>';
  html += users.map((u, i) => `<th title="${u}">${initials[i]}</th>`).join("");
  html += '</tr></thead><tbody>';

  for (const m of upcoming) {
    const dt = new Date(m.datetime).toLocaleDateString([], { day: 'numeric', month: 'short' });
    html += `<tr><td class="game-cell">${flag(m.home_team)}<span class="abr"> v </span>${flag(m.away_team)} <small>${dt}</small></td>`;
    for (const u of users) {
      const p = predictions.find(pr => pr.user === u && pr.match_id === m.id);
      if (!p) { html += '<td class="bd-cell bd-none">–</td>'; continue; }
      const penLabel = p.pen_winner ? ` ${flag(p.pen_winner === "home" ? m.home_team : m.away_team)}` : "";
      html += `<td class="bd-cell">${p.home_score}-${p.away_score}${penLabel}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  document.getElementById("preds-wrap").innerHTML = html;
}
  </script>
</body>
</html>
